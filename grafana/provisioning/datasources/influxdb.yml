apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: iot-org
      defaultBucket: iot-bucket
      tlsSkipVerify: true
    secureJsonData:
      token: my-secret-token
    isDefault: true
    editable: true
